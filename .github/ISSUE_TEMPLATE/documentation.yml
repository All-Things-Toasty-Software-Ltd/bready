name: Documentation improvement
description: Report missing, incorrect, or unclear documentation
title: "[Docs] <short description>"
labels: [documentation]
body:
     - type: checkboxes
       id: affected-docs
       attributes:
            label: Which document(s) need attention?
            options:
                 - label: "`README.md`"
                 - label: "`CONTRIBUTING.md`"
                 - label: "`wiki/Home.md`"
                 - label: "`wiki/Architecture.md`"
                 - label: "`wiki/Bready-Setup.md`"
                 - label: "`wiki/Commands-Reference.md`"
                 - label: "`wiki/Bridge-Guide.md`"
                 - label: "`wiki/Development.md`"
                 - label: "`wiki/Changelog.md`"
                 - label: "`ROADMAP.md`"
                 - label: Code comments / doc comments in source files
                 - label: "Other: ___"

     - type: textarea
       id: what-is-wrong
       attributes:
            label: What is wrong or missing?
            description: A clear description of the problem. Quote the inaccurate text if possible.
       validations:
            required: true

     - type: textarea
       id: suggested-improvement
       attributes:
            label: Suggested improvement
            description: What should it say instead? If it is missing content, describe what should be added.
       validations:
            required: true

     - type: textarea
       id: additional-context
       attributes:
            label: Additional context
            description: Links, screenshots, or anything else that helps.